<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>隨機美食選餐器</title>

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NN選餐">
  <meta name="theme-color" content="#ea580c">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" href="icon.png" type="image/png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    .glass-morphism {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-active:active { transform: scale(0.95); }
    .loader { border-top-color: #F87171; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .cuisine-btn.active, .price-btn.active { background-color: #ffedd5; border-color: #fed7aa; color: #c2410c; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-orange-50 min-h-screen flex flex-col items-center p-4 md:p-8 font-sans">

  <header class="text-center mb-6 animate__animated animate__fadeIn mt-2">
    <h1 class="text-3xl font-black text-orange-600 mb-1">🍴 美食 & 飲料隨機選</h1>
    <p class="text-gray-500 text-xs">專屬您的隨機選餐助手</p>
  </header>

  <main class="w-full max-w-md glass-morphism rounded-3xl shadow-xl p-5 mb-8 animate__animated animate__zoomIn">
    
    <div id="locationStatus" class="text-xs text-center py-2 px-4 rounded-full bg-gray-100 text-gray-500 mb-5 shadow-inner">
      正在取得您的位置...
    </div>

    <div class="mb-4">
      <div class="grid grid-cols-4 gap-2">
        <button onclick="selectCuisine(this, '全部')" class="cuisine-btn active py-2 px-1 text-[11px] rounded-lg border-2 border-orange-200 bg-white text-orange-700 font-bold hover:bg-orange-100 transition-all shadow-sm">全部</button>
        <button onclick="selectCuisine(this, '中式')" class="cuisine-btn py-2 px-1 text-[11px] rounded-lg border-2 border-transparent bg-white text-gray-600 font-bold hover:bg-orange-100 transition-all shadow-sm">中式</button>
        <button onclick="selectCuisine(this, '西式')" class="cuisine-btn py-2 px-1 text-[11px] rounded-lg border-2 border-transparent bg-white text-gray-600 font-bold hover:bg-orange-100 transition-all shadow-sm">西式</button>
        <button onclick="selectCuisine(this, '義式')" class="cuisine-btn py-2 px-1 text-[11px] rounded-lg border-2 border-transparent bg-white text-gray-600 font-bold hover:bg-orange-100 transition-all shadow-sm">義式</button>
        <button onclick="selectCuisine(this, '日式')" class="cuisine-btn py-2 px-1 text-[11px] rounded-lg border-2 border-transparent bg-white text-gray-600 font-bold hover:bg-orange-100 transition-all shadow-sm">日式</button>
        <button onclick="selectCuisine(this, '小吃')" class="cuisine-btn py-2 px-1 text-[11px] rounded-lg border-2 border-transparent bg-white text-gray-600 font-bold hover:bg-orange-100 transition-all shadow-sm">小吃</button>
        <button onclick="selectCuisine(this, '炸物')" class="cuisine-btn py-2 px-1 text-[11px] rounded-lg border-2 border-transparent bg-white text-gray-600 font-bold hover:bg-orange-100 transition-all shadow-sm">炸物</button>
        <button onclick="selectCuisine(this, '酒吧')" class="cuisine-btn py-2 px-1 text-[11px] rounded-lg border-2 border-transparent bg-white text-gray-600 font-bold hover:bg-orange-100 transition-all shadow-sm">酒吧</button>
      </div>
    </div>

    <div class="mb-5">
      <div class="grid grid-cols-5 gap-1.5">
        <button onclick="selectPrice(this, 'all')" class="price-btn active py-2 px-1 text-[10px] rounded-lg border-2 border-orange-200 bg-white text-orange-700 font-bold hover:bg-orange-100 transition-all shadow-sm">全部預算</button>
        <button onclick="selectPrice(this, '1')" class="price-btn py-2 px-1 text-[10px] rounded-lg border-2 border-transparent bg-white text-gray-600 font-bold hover:bg-orange-100 transition-all shadow-sm">1~200</button>
        <button onclick="selectPrice(this, '2')" class="price-btn py-2 px-1 text-[10px] rounded-lg border-2 border-transparent bg-white text-gray-600 font-bold hover:bg-orange-100 transition-all shadow-sm">200~400</button>
        <button onclick="selectPrice(this, '3')" class="price-btn py-2 px-1 text-[10px] rounded-lg border-2 border-transparent bg-white text-gray-600 font-bold hover:bg-orange-100 transition-all shadow-sm">400~600</button>
        <button onclick="selectPrice(this, '4')" class="price-btn py-2 px-1 text-[10px] rounded-lg border-2 border-transparent bg-white text-gray-600 font-bold hover:bg-orange-100 transition-all shadow-sm">600以上</button>
      </div>
    </div>

    <div class="flex flex-col gap-2.5">
      <button id="foodBtn" onclick="pick('food')" disabled class="w-full bg-orange-500 text-white font-bold py-3.5 rounded-2xl shadow-lg hover:bg-orange-600 transition-all btn-active disabled:opacity-50 text-base">
        幫我選一間餐廳！🍛
      </button>
      <div class="grid grid-cols-2 gap-2.5">
        <button id="teaBtn" onclick="pick('tea')" disabled class="bg-teal-500 text-white font-bold py-3 rounded-2xl shadow-md hover:bg-teal-600 transition-all btn-active disabled:opacity-50 text-sm">
          我想喝手搖！🧋
        </button>
        <button id="drinkBtn" onclick="pick('drink')" disabled class="bg-blue-500 text-white font-bold py-3 rounded-2xl shadow-md hover:bg-blue-600 transition-all btn-active disabled:opacity-50 text-sm">
          找間咖啡廳 ☕
        </button>
      </div>
    </div>

    <div id="loadingUI" class="hidden flex-col items-center mt-6 animate__animated animate__fadeIn">
      <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10 mb-3"></div>
      <p id="loadingText" class="text-orange-600 font-bold text-sm italic">正在挑選中...</p>
    </div>

    <div id="resultCard" class="hidden mt-6 bg-white rounded-2xl border border-orange-100 shadow-xl overflow-hidden animate__animated animate__bounceIn">
      <div id="photoContainer" class="w-full h-40 bg-gray-200 relative hidden">
        <img id="resPhoto" src="" class="w-full h-full object-cover">
        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black/80 to-transparent p-3 pt-8">
          <h2 id="resName" class="text-2xl font-black text-white leading-tight drop-shadow-md"></h2>
        </div>
      </div>

      <div class="p-4">
        <h2 id="resNameNoPhoto" class="text-2xl font-black text-gray-800 mb-2 leading-tight hidden"></h2>
        <div class="flex justify-between items-center mb-3">
          <span id="resTag" class="text-[10px] px-2 py-1 rounded font-bold uppercase"></span>
          <div class="flex items-center text-yellow-500 bg-yellow-50 px-2 py-1 rounded-lg text-sm font-bold">
            <span id="resRating"></span> <svg class="w-4 h-4 ml-1 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
          </div>
        </div>
        <div class="bg-orange-50 p-3 rounded-xl mb-4 border border-orange-100 text-xs text-gray-700 leading-relaxed">
          <p id="resSummary"></p>
        </div>
        <div class="space-y-2 mb-5">
          <div class="bg-green-50 border-l-4 border-green-500 p-2.5 rounded-r-xl text-xs italic text-gray-600">
            <p id="resBestReview"></p>
          </div>
          <div class="bg-red-50 border-l-4 border-red-400 p-2.5 rounded-r-xl text-xs italic text-gray-600">
            <p id="resWorstReview"></p>
          </div>
        </div>
        <a id="resMap" href="#" target="_blank" class="block w-full text-center bg-gray-800 text-white py-3.5 rounded-xl font-bold shadow-md">📍 開啟導航</a>
      </div>
    </div>

    <div id="errorUI" class="hidden mt-6 p-4 bg-red-50 text-red-600 rounded-xl text-sm">
      <p id="errorMsg"></p>
    </div>
  </main>

  <script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxufIU4ZU4uXKMk8lozqpdQtfihdCwDUuB9NHHybmcMpobuwfbIZVXD2TLHP12qtQ_v/exec";
    let userCoords = null;
    let selectedCuisine = '全部';
    let selectedPrice = 'all';

    window.onload = function() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
          userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          document.getElementById('locationStatus').innerHTML = '📍 已取得定位';
          document.querySelectorAll('button[disabled]').forEach(b => b.disabled = false);
        });
      }
    };

    function selectCuisine(btn, type) {
      selectedCuisine = type;
      document.querySelectorAll('.cuisine-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function selectPrice(btn, val) {
      selectedPrice = val;
      document.querySelectorAll('.price-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function pick(mode) {
      const loadingUI = document.getElementById('loadingUI');
      const resultCard = document.getElementById('resultCard');
      const errorUI = document.getElementById('errorUI');
      
      loadingUI.classList.remove('hidden');
      resultCard.classList.add('hidden');
      errorUI.classList.add('hidden');

      const url = `${GAS_API_URL}?lat=${userCoords.lat}&lng=${userCoords.lng}&cuisine=${encodeURIComponent(selectedCuisine)}&mode=${mode}&price=${selectedPrice}`;

      fetch(url).then(res => res.json()).then(response => {
        loadingUI.classList.add('hidden');
        if (response.success) {
          const d = response.data;
          if (d.photoUrl) {
            document.getElementById('resPhoto').src = d.photoUrl;
            document.getElementById('photoContainer').classList.remove('hidden');
            document.getElementById('resName').innerText = d.name;
            document.getElementById('resNameNoPhoto').classList.add('hidden');
          } else {
            document.getElementById('photoContainer').classList.add('hidden');
            document.getElementById('resNameNoPhoto').innerText = d.name;
            document.getElementById('resNameNoPhoto').classList.remove('hidden');
          }
          document.getElementById('resRating').innerText = d.rating;
          document.getElementById('resSummary').innerText = d.summary;
          document.getElementById('resBestReview').innerText = '"' + d.bestReview + '"';
          document.getElementById('resWorstReview').innerText = '"' + d.worstReview + '"';
          document.getElementById('resMap').href = d.mapUrl;
          
          const tag = document.getElementById('resTag');
          if (mode === 'tea') { tag.innerText = "想喝手搖"; tag.className = "text-[10px] bg-teal-100 text-teal-600 px-2 py-1 rounded font-bold"; }
          else if (mode === 'drink') { tag.innerText = "咖啡時光"; tag.className = "text-[10px] bg-blue-100 text-blue-600 px-2 py-1 rounded font-bold"; }
          else { tag.innerText = "今日午晚餐"; tag.className = "text-[10px] bg-orange-100 text-orange-600 px-2 py-1 rounded font-bold"; }
          
          resultCard.classList.remove('hidden');
        } else {
          errorUI.classList.remove('hidden');
          document.getElementById('errorMsg').innerText = response.message;
        }
      });
    }
  </script>
</body>
</html>
